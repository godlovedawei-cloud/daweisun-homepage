<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dawei Sun</title>
  <meta name="description" content="Dawei Sun's personal website.">
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #607080;
      --line: #d9e2ec;
      --paper: #f7f9fb;
      --accent: #127369;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(720px, 100%);
      border-top: 4px solid var(--accent);
      padding-top: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 9vw, 84px);
      line-height: 0.95;
      font-weight: 750;
    }

    p {
      max-width: 56ch;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.65;
    }

    .meta {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Dawei Sun</h1>
    <p>Personal website placeholder. This page is live-ready for basic HTTP verification while the full site is still being built.</p>
    <div class="meta">daweisun.com</div>
  </main>
</body>
</html>
